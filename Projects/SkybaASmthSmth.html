<h1>The Something Something</h1>
<h2>Click on a button to change its text!</h2>

<div><button>The</button></div>
<div><button>Big</button></div>
<div><button>Frog</button></div>
<div><button>Hopped</button></div>
<div><button>Over</button></div>
<div><button>The</button></div>
<div><button>Log</button></div>

<script>
    let buttons = document.querySelectorAll("button")
    let text
    for (const button of buttons) {
        button.addEventListener("click", () =>  {
            text = prompt("Choose your new label!")
            if (text !== "") button.textContent = text
        })
    }
</script>

<style>
    div button {
        text-align: center;
        background-color: aqua;
        font-size: large;
    }
    body {
        background-color: brown;
    }
</style>
