<!DOCTYPE html>
<html>
    <head>
        <title>Poke the Pig!</title>
        <style>
            img {
                position: absolute;
                border: black 1px;
                width: 500px;
                height: 500px;
                top: 55%;
                left: 36%;
            }

            button {
                position: absolute;
                text-align: center;
                border-radius: 4px;
                border: none;
                font-size: large;
                padding: 10px 24px;
                transition-duration: 0.4s;
            }

            button:hover {
                box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2), 0 6px 20px 0 rgba(0,0,0,0.19);
                transform: translateY(-2px);
            }

            #pigButton {
                top: 20%;
                left: 42.5%;
                background-color: pink;
            }

            #dolphinButton {
                top: 20%;
                left: 52%;
                background-color: aqua;
            }

            #elephantButton {
                top: 30%;
                left: 41.5%;
                background-color: gray;
            }

            #duckButton {
                top: 30%;
                left: 52.8%;
                background-color: yellow;
            }

            #snakeButton {
                top: 40%;
                left: 42.2%;
                background-color: green;
            }

            #horseButton {
                top: 40%;
                left: 52.7%;
                background-color: brown;
            }

            #clearButton {
                background-color: burlywood;
                top: 50%;
                left: 47.8%;
            }

        </style>
    </head>
    <body>
        <center>
            <h1>Poke the Pig</h1>
            <h2>Click on your favourite animal!</h2>
            <h1 id="soundLabel"">Your sound will appear here</h1>
                <button id="pigButton">Pig</button>
                <button id="dolphinButton">Dolphin</button>
                <button id="elephantButton">Elephant</button>
                <button id="duckButton">Duck</button>
                <button id="snakeButton">Snake</button>
                <button id="horseButton">Horse</button>
                <button id="clearButton">Clear</button>
        </center>

        <script>
            function createAnimal(id) {
                let audio = document.createElement("audio")

                if (document.getElementsByTagName("img").length > 0) {
                    document.querySelector("img").remove()
                }

                if (id == "pigButton") {
                    let image = document.createElement("img")
                    image.src = "https://easydrawingguides.com/wp-content/uploads/2017/03/How-to-draw-a-cartoon-pig-20.png"
                    image.alt = "image failed to load"
                    document.querySelector("center").appendChild(image)

                    audio.src = "pigSound.mp3"
                    audio.play()

                    document.getElementById("soundLabel").nodeValue = "Oink!"
                }

                if (id == "dolphinButton") {
                    let image = document.createElement("img")
                    image.src = "https://static.vecteezy.com/system/resources/previews/016/765/712/original/dolphin-cartoon-cute-sea-animal-png.png"
                    image.alt = "image failed to load"
                    document.querySelector("center").appendChild(image)

                    audio.src = "dolphinSound.mp3"
                    audio.play()

                    document.getElementById("soundLabel").nodeValue = "kakadaKKAdaKADa!"
                }

                if (id == "elephantButton") {
                    let image = document.createElement("img")
                    image.src = "https://static.vecteezy.com/system/resources/previews/011/459/700/original/elephant-cartoon-design-on-transparent-background-png.png"
                    image.alt = "image failed to load"
                    document.querySelector("center").appendChild(image)

                    audio.src = "elephantSound.mp3"
                    audio.play()

                    document.getElementById("soundLabel").nodeValue = "UUHHErrrrrrrrrrrRRRRRRRR!"
                }

                if (id == "duckButton") {
                    let image = document.createElement("img")
                    image.src = "https://static.vecteezy.com/system/resources/previews/015/738/483/non_2x/cute-cartoon-yellow-baby-duck-free-png.png"
                    image.alt = "image failed to load"
                    document.querySelector("center").appendChild(image)

                    audio.src = "duckSound.mp3"
                    audio.play()

                    document.getElementById("soundLabel").nodeValue = "Quack!"
                }

                if (id == "snakeButton") {
                    let image = document.createElement("img")
                    image.src = "https://static.vecteezy.com/system/resources/previews/023/353/723/original/funny-cartoon-snake-free-png.png"
                    image.alt = "image failed to load"
                    document.querySelector("center").appendChild(image)

                    audio.src = "snakeSound.mp3"
                    audio.play()

                    document.getElementById("soundLabel").nodeValue = "ssssSSSSSSssSSs!"
                }

                if (id == "horseButton") {
                    let image = document.createElement("img")
                    image.src = "https://pngfre.com/wp-content/uploads/horse-png-from-pngfre-6-716x1024.png"
                    image.alt = "image failed to load"
                    document.querySelector("center").appendChild(image)

                    audio.src = "horseSound.mp3"
                    audio.play()

                    document.getElementById("soundLabel").nodeValue = "Neeiggghh!"
                }

                if (id == "clearButton") document.getElementById("soundLabel").nodeValue = "Your sound will appear here"
            }

            for (let button of document.querySelectorAll("button")) {
                button.addEventListener("click", function() {
                    createAnimal(button.id)
                })
            }
        </script>
    </body>
</html>
