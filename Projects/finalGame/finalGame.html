<!-- Top Down 2D Game inspired by Awesome Tanks -->

<!DOCTYPE html>
<html>
    <head>
        <!-- set a tab title -->
        <title>Awesome Tanks</title>

        <!-- import custom fonts for CSS -->
        <link href="https://fonts.googleapis.com/css?family=Nunito" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">

        <style>
            body, html {
                /* prevent elements from being highlightable */
                user-select: none;
                /* prevent scrollbars */
                overflow: hidden;
                margin: 0;
                /* fill the entire screen */
                height: 100%;
                width: 100%;
                background-color: rgb(155, 74, 74);
            }

            #splashScreen h1 {
                /* align text */
                text-align: center;
                /* set font properties */
                font-family: "Chewy", cusive;
                font-size: 1050%;
                /* rotate text */
                transform: rotate(-8deg);
                top: 19%;
                left: 1.5%;
                text-transform: uppercase;
                animation: titleRotate 5s ease-in-out infinite;
            }

            @keyframes titleRotate {
                /* start at -8 degrees */
                0% {
                    transform: rotate(-8deg);
                }

                /* go to -6 degrees */
                50% {
                    transform: rotate(-6deg);
                }

                /* go back to -8 degrees */
                100% {
                    transform: rotate(-8deg);
                }
            }

            @keyframes rotationWiggle {
                0% {
                    transform: rotate(0deg);
                }

                25% {
                    transform: rotate(3deg);
                }

                50% {
                    transform: rotate(0deg);
                }

                75% {
                    transform: rotate(-3deg);
                }

                100% {
                    transform: rotate(0deg);
                }
            }

            @keyframes fadeInOut {
                0% {
                    font-size: 320%;
                    opacity: 1;
                }

                /* 15% {
                    font-size: 320%;
                    opacity: 1;
                } */

                50% {
                    font-size: 300%;
                    opacity: 0;
                }

                /* 85% {
                    font-size: 320%;
                    opacity: 1;
                } */

                100% {
                    font-size: 320%;
                    opacity: 1;
                }
            }

            @keyframes fadeIn {
                /* start at fully transparent */
                0% { 
                    opacity: 0;
                }

                /* become fully opaque */
                100% {
                    opacity: 1;
                }
            }

            @keyframes fadeOut {
                /* start fully opaque */
                0% { 
                    opacity: 1;
                }

                /* become fully transparent */
                100% {
                    opacity: 0;
                }
            }

            /* create classes to automatically trigger fade animations */
            
            .fadeIn {
                animation: fadeIn 1.5s;
            }

            .fadeOut {
                animation: fadeOut 1.5s;
            }

            #splashScreen p {
                /* allow image to overlap */
                position: absolute;
            }

            #splashScreen {
                top: -100%;
            }

            #tactical {
                color: #FFA500;
                /* flashy text shadow */
                text-shadow: 0.025em 0.025em 0 white, 0.05em 0.05em 0 #CC0077;
            }

            #tanks {
                margin-top: -3%;
                color: #CC0077;
                /* flashy text shadow */
                text-shadow: 0.025em 0.025em 0 orange, 0.05em 0.05em 0 black;
            }
            
            /* class to fill the screen to avoid repeating code */
            .fill {
                /* allow overlap */
                position: absolute;
                /* fill the screen */
                width: 100%;
                height: 100%;
                /* position at top left corner */
                top: 0%;
                left: 0%;
                margin: 0;
                padding: 0;
            }

            /* class for centering element */
            .center {
                /* position half way horizontally */
                left: 50%;
                /* position half way vertically */
                top: 50%;
                /* move by half of your size */
                transform: translate(-50%, -50%);
                /* remove margin and padding */
            }

            #splashScreen h1 span {
                display: block;
            }

            #splashScreen p {
                margin-left: 0.8%;
                bottom: 0%;
                margin-bottom: 0.8%;
                font-family: "Chewy";
                font-size: 120%;
                text-align: center;
                color: white;
                /* 1px border */
                text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            }

            #clickAnywhereText {
                top: 70%;
                left: 50%;
                transform: translate(-50%);
                font-size: 320%;
                position: absolute;
                font-family: "Nunito";
                color: pink;
                /* outline */
                text-shadow:
                -1px -1px 1px #000, 1px -1px 2px #000, -1px 1px 2px #000, 1px 1px 2px #000, 
                -2px -2px 1px #000, 2px -2px 2px #000, -2px 2px 2px #000, 2px 2px 2px #000;
                display: none;
            }

            #preSplashScreen {
                text-align: center;
            }

        </style>
    </head>
    <body>
        <!-- containers for each screen -->

        <!-- needed because you can't play music without user action and I want music on the splash screen -->
        <div id="preSplashScreen">
            <p style="color: white;">Please wait for the page to fully load before continuing.</p>
            <!-- start the splash screen on click -->
            <button onclick="splashScreen()">Continue</button>
        </div>

        <div class="fill" style="display: none;" id="splashScreen">
            <img class="fill" src="/Users/anthony/Pictures/final game/splashScreen.png">
            <p>Made by<br>Anthony Skyba</p>
            <h2 id="clickAnywhereText">Click Anywhere to Start</h2>
            <!-- splash screen title -->
            <h1 class="fill">
                <!-- seperate words into containers to style them differently -->
                <span id="tactical">Tactical</span>
                <span id="tanks">Tanks</span>
            </h1>

        <div class="fill" style="display: none;" id="gameScreen">
            <canvas id="canvas"></canvas>
        </div>

        <div class="fill" style="display: none;" id="loseScreen"></div>

        <div class="fill" style="display: none;" id="winScreen"></div>

        <!-- import pathfinding liary -->
        <script src="https://cdn.jsdelivr.net/npm/pathfinding@0.4.18/visual/lib/pathfinding-browser.min.js"></script>
        <script>
            // prevent elements from being draggable
            document.body.addEventListener("dragstart", function(event) { event.preventDefault(); });

            // define the canvas and context
            let canvas = document.getElementById("canvas");
            let ctx = canvas.getContext("2d");

            // initialize canvas dimensions
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // initialize variables for path finding globally
            var finder = new PF.AStarFinder();
            var grid;

            // counters
            let firstRedraw = true;
            let movingUp = false;
            let movingDown = false;
            let movingLeft = false;
            let movingRight = false;

            // define game screens
            let splashScreen = document.getElementById("splashScreen");
            let gameScreen = document.getElementById("gameScreen");
            let loseScreen = document.getElementById("losescreen");
            let winScreen = document.getElementById("winScreen");

            // initialize velocities
            let ySpeedUp = 0;
            let ySpeedDown = 0;
            let xSpeedLeft = 0;
            let xSpeedRight = 0;
            let bulletSpeed = 8;
            let enemySpeed = 2.5;
            let enemyBulletSpeed = 6;

            // initialize coordinates
            let x = 0;
            let y = 0;

            let mouseX;
            let mouseY;

            // initialize hitpoints
            let blockHP = 8;

            // initiliaze view distance
            let viewDistance = 2.9;

            // initialize the top corner of the map
            let smallestY = Infinity;
            let smallestX = Infinity;

            // tracking variables
            let blocks = [];
            let bullets = [];
            let enemyIndexes = [];

            // initialize sizes
            let blockSize = 100;
            let tankSize = 90;
            let bulletSize = tankSize / 10;
            let enemyBulletSize = tankSize / 5;

            // initiliaze middle of the screen
            let middleX = window.innerWidth / 2 - tankSize / 2;
            let middleY = window.innerHeight / 2 - tankSize / 2;

            // create variables for the sources

            let tankSrc = "https://cdn-icons-png.flaticon.com/512/942/942355.png";
            let stoneSrc = "file:///Users/anthony/Pictures/final%20game/stone.png";
            let cardboardSrc = "file:///Users/anthony/Pictures/final%20game/cardboard.png";
            let bulletSrc = "https://freesvg.org/img/CartoonBullet.png";
            let enemySrc = "https://cdn-icons-png.flaticon.com/512/7145/7145327.png";
            let enemyBulletSrc = "https://png.pngtree.com/png-vector/20220520/ourmid/pngtree-projectile-from-weapon-mortar-on-white-background-is-insulated-png-image_4697545.png";
            let shadowSrc = "https://images.squarespace-cdn.com/content/v1/58f56c10d2b857170c9ac044/1519534019246-BTNF5DSIPKUZD7FB5VY6/Black+Square";

            // create sprites

            let tank = document.createElement("img");
            tank.src = tankSrc;

            let stone = document.createElement("img");
            stone.src = stoneSrc;

            let cardboard = document.createElement("img");
            cardboard.src = cardboardSrc;

            let bullet = document.createElement("img");
            bullet.src = bulletSrc;

            let enemy = document.createElement("img");
            enemy.src = enemySrc;

            let enemyBullet = document.createElement("img");
            enemyBullet.src = enemyBulletSrc;

            let shadow = document.createElement("img");
            shadow.src = shadowSrc;

            // game loop
            function draw() {
                // clear all elements on screen
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // redraw elements in new positions

                // initialize the position of the first block relative to the tank
                let startingX = (middleX - x - blockSize * 2);
                let startingY = (middleY - y - blockSize * 3);

                // function to draw line of blocks
                function line(image, xPos, yPos, amount, direction) {
                    // loop through the length of the line
                    for (let i = 0; i < amount; i++) {
                        if (direction == "left") {
                            // shift position to the correct location if it's the first iteration
                            if (!i) xPos -= blockSize;

                            // find new coordinate
                            let newXPos = xPos + blockSize * -i;

                            // draw block
                            ctx.drawImage(image, newXPos, yPos, blockSize, blockSize);
                            // record block data (coordinates, HP, block type, etc.)
                            if (firstRedraw) blocks.push([newXPos, yPos, image, blockHP, false, false, [0, 0], false, [0, 0], 0, false]);

                            // update position so the next line doesn't overlap
                            startingX -= blockSize;
                        // repeat for other directions
                        } else if (direction == "right") {
                            if (!i) xPos += blockSize;

                            let newXPos = xPos + blockSize * i;

                            ctx.drawImage(image, newXPos, yPos, blockSize, blockSize);
                            if (firstRedraw) blocks.push([newXPos, yPos, image, blockHP, false, false, [0, 0], false, [0, 0], 0, false]);

                            startingX += blockSize;
                        } else if (direction == "up") {
                            if (!i) yPos -= blockSize;

                            let newYPos = yPos + blockSize * -i;

                            ctx.drawImage(image, xPos, newYPos, blockSize, blockSize);
                            if (firstRedraw) blocks.push([xPos, newYPos, image, blockHP, false, false, [0, 0], false, [0, 0], 0, false]);

                            startingY -= blockSize;
                        } else {
                            if (!i) yPos += blockSize;

                            let newYPos = yPos + blockSize * i;

                            ctx.drawImage(image, xPos, newYPos, blockSize, blockSize);
                            if (firstRedraw) blocks.push([xPos, newYPos, image, blockHP, false, false, [0, 0], false, [0, 0], 0, false]);

                            startingY += blockSize;
                        }
                    }
                }

                function shadowMap(val1, val2) {
                    // loop through height of shadow * 2
                    for (let i = 0; i < val1; i++) {
                        // make rows across the entire map with shadows
                        line(shadow, startingX, startingY, 1, "down");
                        line(shadow, startingX, startingY, val2, "right");
                        line(shadow, startingX, startingY, 1, "down");
                        line(shadow, startingX, startingY, val2, "left");
                    }
                }
                
                // save current canvas settings to the stack
                ctx.save();
                
                // find angle (in radians)
                let angle = Math.atan2(mouseY - (middleY + tankSize / 2), mouseX - (middleX + tankSize / 2)) + 1.5708;
                
                // translate rotation point to the center of the tank
                ctx.translate(middleX + tankSize / 2, middleY + tankSize / 2);

                // rotate the canvas to point to the cursor
                ctx.rotate(angle);
                
                // draw tank
                ctx.drawImage(tank, -tankSize / 2, -tankSize / 2, tankSize, tankSize);

                // load settings back
                ctx.restore();
                
                // designing the levels

                if (firstRedraw) {
                    // draw lines of blocks
                    line(stone, startingX, startingY, 5, "down");
                    line(stone, startingX, startingY, 4, "right");
                    line(stone, startingX, startingY, 4, "up");
                    line(cardboard, startingX, startingY, 3, "left");
                    // shift position to make floating blocks
                    startingX -= blockSize;
                    line(stone, startingX, startingY, 8, "left");
                    line(stone, startingX, startingY, 11, "up");
                    line(stone, startingX, startingY, 21, "right");
                    line(stone, startingX, startingY, 11, "down");
                    line(stone, startingX, startingY, 8, "left");
                    startingY -= blockSize * 2;
                    line(stone, startingX, startingY, 6, "up");
                    startingX -= blockSize * 2;
                    line(cardboard, startingX, startingY, 4, "left");
                    startingX -= blockSize * 2;
                    startingY += blockSize * 2;
                    line(cardboard, startingX, startingY, 4, "left");
                    startingX += blockSize * 4;
                    startingY += blockSize * 2;
                    line(cardboard, startingX, startingY, 4, "right");
                    line(cardboard, startingX, startingY, 1, "down");
                    line(cardboard, startingX, startingY, 3, "left");
                    startingX += blockSize * 7;
                    startingY -= blockSize * 3;
                    line(stone, startingX, startingY, 2, "left");
                    startingX += blockSize * 2;
                    line(stone, startingX, startingY, 3, "right");
                    startingY += blockSize * 3;
                    line(cardboard, startingX, startingY, 2, "right");
                    line(cardboard, startingX, startingY, 1, "up");
                    startingY -= blockSize * 4;
                    line(cardboard, startingX, startingY, 1, "up");
                    line(cardboard, startingX, startingY, 1, "right");
                    line(cardboard, startingX, startingY, 1, "down");
                    startingX -= blockSize * 4;
                    line(enemy, startingX, startingY, 1, "up");
                    startingY += blockSize;
                    line(enemy, startingX, startingY, 1, "down");
                    startingY += blockSize * 2;
                    line(enemy, startingX, startingY, 1, "down");
                    startingX -= blockSize * 7;
                    startingY -= blockSize * 2;
                    line(enemy, startingX, startingY, 1, "down");
                    startingY -= blockSize * 5;
                    line(enemy, startingX, startingY, 1, "down");
                    startingY += blockSize;
                    startingX -= blockSize * 5;
                    line(enemy, startingX, startingY, 1, "down");
                    startingY += blockSize * 5;
                    startingX -= blockSize;
                    line(enemy, startingX, startingY, 1, "down");
                    startingX -= blockSize * 11;
                    startingY -= blockSize * 18;

                    // fill the map with shadows
                    shadowMap(14, 39);

                    // level is 22 wide, 16 tall (not including shadows)
                    grid = new PF.Grid(22, 16);

                    // loop through all blocks
                    for (let block of blocks) {
                        // skip iteration if shadow
                        if (block[2].src == shadowSrc) continue

                        // find top left corner X position
                        if (block[0] < smallestX) smallestX = block[0];

                        // find top left corner Y position
                        if (block[1] < smallestY) smallestY = block[1];
                    }

                    // track index
                    let i = -1;
                    for (let block of blocks) {
                        // increment index
                        i++;
                        // skip iteration if the block is broken or if the block is a shadow
                        if (block[4] || block[2].src == shadowSrc) continue;

                        // push index to enemyIndexes it it's an enemy
                        if (block[2].src == enemySrc) 
                            enemyIndexes.push(i);
                    }
                } else {
                    // update non-walkable locations
                    updateGrid();

                    // update enemy positions
                    updateEnemies();

                    // loop through all blocks
                    for (let block of blocks) {
                        // initialize enemy properties
                        let blockX = block[0] - x;
                        let blockY = block[1] - y;
                        
                        // add a range around the tank
                        let tankX = (window.innerWidth / 2 - blockSize * (viewDistance / 2));
                        let tankY = (window.innerHeight / 2 - blockSize * (viewDistance / 2));
                        
                        // clear shadows in view distance of tank
                        if ((blockX < tankX + blockSize * viewDistance && blockX + blockSize > tankX &&
                        blockY < tankY + blockSize * viewDistance && blockY + blockSize > tankY) &&
                        block[2].src == shadowSrc) {
                            // treat the block as "broken"
                            block[4] = true;
                        }    
                        
                        // skip iteration if block is broken
                        if (block[4]) continue;

                        // redraw block

                        // if moving right
                        if (block[10]) {
                            ctx.save();
                            // flip image
                            ctx.scale(-1, 1);
                            // draw with offset to account for flipped positions
                            ctx.drawImage(block[2], -block[0] - blockSize + x, block[1] - y, blockSize, blockSize);
                            ctx.restore();
                        } else {
                            // else draw normally
                            ctx.drawImage(block[2], block[0] - x, block[1] - y, blockSize, blockSize);
                        }
                    }
                }

                // coordinates of next location
                let nextX = x + xSpeedLeft + xSpeedRight;
                let nextY = y + ySpeedDown + ySpeedUp;

                // create counters
                let moveRight = true;
                let moveLeft = true;
                let moveUp = true;
                let moveDown = true;

                // loop through all blocks
                for (let block of blocks) {
                    // skip iteration if the block is broken or it's an enemy or it's a shadow
                    if (block[4] || block[2].src == enemySrc || block[2].src == shadowSrc) continue;

                    // initialize block properties
                    let blockX = block[0];
                    let blockY = block[1];
                    
                    // initialize tank properties
                    let tankX = middleX;
                    let tankY = middleY;
                    
                    // update next position for x but not for y
                    blockX -= nextX;
                    blockY -= y;
                    
                    // collison on the right
                    if (tankX + tankSize > blockX && tankX < blockX + blockSize && 
                        tankY < blockY + blockSize && tankY + tankSize > blockY) {
                        moveRight = false;
                    }

                    // collision on the left
                    if (tankX < blockX + blockSize && tankX + tankSize > blockX && 
                        tankY < blockY + blockSize && tankY + tankSize > blockY) {
                        moveLeft = false;
                    }

                    // update next position for y but not for x
                    blockX += xSpeedLeft + xSpeedRight;
                    blockY += y - nextY;

                    // collision on the bottom
                    if (tankY + tankSize > blockY && tankY < blockY + blockSize &&
                        tankX < blockX + blockSize && tankX + tankSize > blockX) {
                        moveDown = false;
                    }

                    // collision on the top
                    if (tankY < blockY + blockSize && tankY + tankSize > blockY &&
                        tankX < blockX + blockSize && tankX + tankSize > blockX) {
                        moveUp = false;
                    }
                }
                
                // update positions

                if (moveRight) {
                    // update coordinate
                    x += xSpeedRight;
                    // trigger counter
                    movingRight = true;
                } else {
                    movingRight = false;
                }

                // repeat for other directions
                if (moveLeft) {
                    x += xSpeedLeft;
                    movingLeft = true;
                } else {
                    movingLeft = false;
                }

                if (moveUp) {
                    y += ySpeedUp;
                    movingUp = true;
                } else {
                    movingUp = false;
                }

                if (moveDown) {
                    y += ySpeedDown;
                    movingDown = true;
                } else {
                    movingDown = false;
                }

                // update bullet positions
                updateBullet();
                
                // draw bullets
                bullets.forEach((coordinates) => {
                    // check which type of bullet to draw
                    if (coordinates[4]) {
                        ctx.drawImage(enemyBullet, coordinates[0], coordinates[1], enemyBulletSize, enemyBulletSize);
                    } else {
                        ctx.drawImage(bullet, coordinates[0], coordinates[1], bulletSize, bulletSize);
                    }
                });
                
                // toggle off firstRedraw
                firstRedraw = false;
                
                // infinite recursion
                requestAnimationFrame(draw);
            }

            function updateGrid() {
                // loop through horizontally
                for (let i = 0; i < 22; i++) {
                    // loop through vertically
                    for (let j = 0; j < 16; j++) {
                        // loop through blocks
                        for (block of blocks) {
                            // make block walkable if it's broken
                            if (block[4]) {
                                grid.setWalkableAt(i, j, true);
                                continue;
                            }

                            // check if it's a not walkable location
                            if (block[0] == i * blockSize + smallestX && block[1] == j * blockSize + smallestY &&
                                block[2].src != enemySrc && block[2].src != shadowSrc) {
                                // set the location to non walkable
                                grid.setWalkableAt(i, j, false);
                                break;
                            }
                        }
                    }
                }
            }

            function updateEnemies() {
                // loop through all enemies
                for (let i of enemyIndexes) {
                    // skip iteration if enemy is destroyed
                    if (blocks[i][4]) continue;

                    // initiliaze enemy properties
                    let enemyX = blocks[i][0] - x;
                    let enemyY = blocks[i][1] - y;

                    // add a range around the tank
                    let tankX = (window.innerWidth / 2 - blockSize * (viewDistance / 2));
                    let tankY = (window.innerHeight / 2 - blockSize * (viewDistance / 2));

                    // check if enemies are in viewing range of the tank
                    let inRange = enemyX < tankX + blockSize * viewDistance && enemyX + blockSize > tankX &&
                                  enemyY < tankY + blockSize * viewDistance && enemyY + blockSize > tankY;

                    // check if tank enemy should proceed the tank
                    if ((inRange || blocks[i][5]) && !blocks[i][4]) {
                        // allow the enemy to continue chasing after it has seen you once
                        blocks[i][5] = true;
                        
                        // add a delay to decrease fire rate
                        if (blocks[i][9] == 0) {
                            // shoot at the tank
                            createBullet(enemyX, enemyY);
                            // reset the buffer
                            blocks[i][9] = 65;
                        }
                        
                        // increment firerate buffer
                        blocks[i][9]--;

                        // remake the path only when the enemy has stopped moving
                        if (!blocks[i][7]) {
                            // initialize positions on the grid
                            let enemyGridX = 0;
                            let enemyGridY = 0;
    
                            let tankGridX = Math.floor(x / blockSize) + 10;
                            let tankGridY = Math.floor(y / blockSize) + 13;
    
                            // avoid changing the original variables
                            let enemyXClone = enemyX;
                            let enemyYClone = enemyY;
    
                            let topLeftX = smallestX - x;
                            let topLeftY = smallestY - y;
    
                            // find positions on the grid
                            while (enemyXClone > topLeftX || enemyYClone > topLeftY) {
                                // find enemy X
                                if (enemyXClone > topLeftX) {
                                    enemyXClone -= blockSize;
                                    enemyGridX++;
                                }
    
                                // find enemy Y
                                if (enemyYClone > topLeftY) {
                                    enemyYClone -= blockSize;
                                    enemyGridY++;
                                }
                                
                            }

                            // create the path
                            var path = finder.findPath(enemyGridX, enemyGridY, tankGridX, tankGridY, grid.clone());

                            // toggle enemy moving
                            blocks[i][7] = true;
                            
                            // find the next direction
                            try {
                                blocks[i][8][0] = path[1][0] - enemyGridX;
                                blocks[i][8][1] = path[1][1] - enemyGridY;
                            } catch(e) {
                                blocks[i][8][0] = 0;
                                blocks[i][8][1] = 0;
                            }
                            
                            // record current coordinates
                            blocks[i][6][0] = blocks[i][0];
                            blocks[i][6][1] = blocks[i][1];
                        } else {
                            // simplified variables for original coodinates
                            let originalEnemyX = blocks[i][6][0];
                            let originalEnemyY = blocks[i][6][1];

                            // simplified variable for direction
                            let xDifference = blocks[i][8][0];
                            let yDifference = blocks[i][8][1];

                            // move horizontally
                            blocks[i][0] += enemySpeed * xDifference;
                            
                            // move vertically
                            blocks[i][1] += enemySpeed * yDifference;

                            // check if enemy is not moving
                            if (xDifference == 0 && yDifference == 0) {
                                // toggle enemy moving
                                blocks[i][7] = false;
                            } else {
                                // flip image if moving right
                                if (xDifference > 0) blocks[i][10] = true;
                                else blocks[i][10] = false;
                            }

                            // check if enemy has moved a full square (or more)
                            if (blocks[i][0] <= originalEnemyX - blockSize || blocks[i][0] >= originalEnemyX + blockSize ||
                                blocks[i][1] >= originalEnemyY + blockSize || blocks[i][1] <= originalEnemyY - blockSize) {
                                // toggle enemy moving
                                blocks[i][7] = false;
                            }
                        }
                    }
                }
            }

            function startGame() {
                // show game screen
                gameScreen.style.display = "block";

                // create movement

                // move when key is pressed down
                document.body.addEventListener("keydown", function(event) {
                    if (event.key == "w") ySpeedUp = -5;
                    if (event.key == "a") xSpeedLeft = -5;
                    if (event.key == "s") ySpeedDown = 5;
                    if (event.key == "d") xSpeedRight = 5;
                });

                // stop moving when key is let go
                document.addEventListener("keyup", function(event) {
                    if (event.key == "w") ySpeedUp = 0;
                    if (event.key == "a") xSpeedLeft = 0;
                    if (event.key == "s") ySpeedDown = 0;
                    if (event.key == "d") xSpeedRight = 0;
                });

                // shoot bullets when mouse is clicked
                document.addEventListener("mousedown", function(event) {
                    // only create a bullet if the left mouse is clicked
                    if (event.button == 0) createBullet();
                });

                // track mouse coordinates whem mouse is moved
                document.addEventListener("mousemove", function(event) {
                    mouseX = event.clientX;
                    mouseY = event.clientY;
                });

                // start the game loop
                draw();
            }

            function createBullet(enemyXPos, enemyYPos) {
                // initialize type of bullet
                let enemyShot = Boolean(enemyXPos);

                // initialize variables in outer scope
                let bulletX;
                let bulletY;

                let deltaX;
                let deltaY;

                // initialize middle
                let middleXPos = window.innerWidth / 2;
                let middleYPos = window.innerHeight / 2;

                // check if it's a tank bullet or enemy bullet
                if (!enemyShot) {
                    // initialize bullet coordinates
                    bulletX = middleXPos;
                    bulletY = middleYPos;

                    // find direction
                    deltaX = mouseX - bulletX;
                    deltaY = mouseY - bulletY;
                // repeat for enemy bullets
                } else {
                    bulletX = enemyXPos + blockSize / 2;
                    bulletY = enemyYPos + blockSize / 2;

                    deltaX = middleXPos - bulletX;
                    deltaY = middleYPos - bulletY;
                }

                // find length of hypotenuse using pythagorean theorem
                let length = Math.sqrt(deltaX ** 2 + deltaY ** 2);

                // divide by length so the distance of the cursor doesn't matter
                deltaX /= length;
                deltaY /= length;

                // add the bullet to bullets
                bullets.push([bulletX, bulletY, deltaX, deltaY, enemyShot]);             
            }

            function updateBullet() {
                // loop through all bullets
                for (let i = bullets.length - 1; i >= 0; i--) {
                    // initialize bullet
                    let bullet = bullets[i];

                    // remove bullet if it goes off the screen (helps with lag)
                    if (bullet[0] < 0 || bullet[0] > screen.innerWidth ||
                        bullet[1] < 0 || bullet[1] > screen.innerHeight) {
                        bullets.splice(i, 1);
                        continue;
                    }

                    // initialize the type of bullet
                    let enemyShot = bullet[4];

                    // check the type of bullet
                    if (enemyShot) {
                        // update enemy bullet position
                        bullet[0] += enemyBulletSpeed * bullet[2];
                        bullet[1] += enemyBulletSpeed * bullet[3];
                    } else {
                        // update normal bullet position
                        bullet[0] += bulletSpeed * bullet[2];
                        bullet[1] += bulletSpeed * bullet[3];
                    }

                    // move bullet with the tank offset
                    if (movingDown) bullet[1] -= ySpeedDown;
                    if (movingUp) bullet[1] -= ySpeedUp;
                    if (movingRight) bullet[0] -= xSpeedRight;
                    if (movingLeft) bullet[0] -= xSpeedLeft;

                    // Check for collisions
                    let collision = false;

                    outerLoop: for (let block of blocks) {
                        // skip iteration if block is broken
                        if (block[4]) continue;

                        // initialize block coordinates
                        let blockX = block[0] - x;
                        let blockY = block[1] - y;

                        // check if tank was hit (need hit detection not this garb) -----------------------------------------------------------
                        if (block[2].src == tankSrc) {
                            // conditions for tank hit ----------------------------------------------------------------------------------------
                        }

                        // hit detection
                        if (blockX < bullet[0] + bulletSize && blockX + blockSize > bullet[0] &&
                            blockY < bullet[1] + bulletSize && blockY + blockSize > bullet[1]) {

                            // automatically stop the bullet if hits a shadow
                            if (block[2].src == shadowSrc) {
                                collision = true;
                                break outerLoop;
                            }
                            
                            // loop through all blocks again
                            for (let block2 of blocks) {
                                // check to see if the block is overlapping with a shadow to avoid shooting through shadows
                                if (block2[0] == block[0] && block2[1] == block[1] &&
                                    !enemyShot && block2[2].src == shadowSrc && !block2[4]) {
                                    // stop the bullet
                                    collision = true;
                                    break outerLoop;
                                }
                            }

                            // avoid enemy shots hitting the enemies
                            if (enemyShot) {
                                if (block[2].src != enemySrc)
                                    collision = true;
                            } else {
                                collision = true;
                            }

                            // check if block is damagable
                            if (block[2].src == cardboardSrc || (block[2].src == enemySrc && !enemyShot)) {

                                // create a red flash animation
                                ctx.fillStyle = "red";
                                ctx.fillRect(blockX, blockY, blockSize, blockSize);
                            
                                // decrease block's HP
                                block[3]--;

                                // check block HP
                                if (block[3] == 0) {
                                    // visually remove the block
                                    ctx.clearRect(blockX, blockY, blockSize, blockSize);
                                    // internally remove the block
                                    block[4] = true;
                                }
                            }

                            // skip the rest of the iterations
                            break;
                        }
                    }

                    // remove bullet if it collided
                    if (collision) bullets.splice(i, 1);
                }
            }

            function startSplash() {
                // show splash screen
                splashScreen.style.display = "block";

                // access element
                let clickAnywhereText = document.getElementById("clickAnywhereText");

                // wait 3 seconds
                setTimeout(function() {
                    // fade in click anywhere text
                    clickAnywhereText.classList.add("fadeIn");
                    // remove hidden property from click anywhere text
                    clickAnywhereText.style.display = "block";

                    // wait until animation is done
                    clickAnywhereText.addEventListener("animationend", function() {
                        clickAnywhereText.style.animation = "fadeInOut ease-in-out 4s infinite";
                    // only listen once
                    }, {once: true})
                }, 3000)

            }
