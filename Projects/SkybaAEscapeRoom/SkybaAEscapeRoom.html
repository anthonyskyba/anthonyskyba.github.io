<!DOCTYPE html>
<html>
    <head>
        <title>Escape Room</title>
        <style>
            body, html {
                margin: 0;
                padding: 0;
                overflow-y: hidden;
                height: 100%;
                background-color: black;
                overflow-x: hidden;
                user-select: none;
            }

            button {
                font-family: 'Chiller', cursive;
                background-color: #222;
                transition: 0.4s ease;
                position: relative;
                z-index: 1;
                color: #1d1d1d;
                width: 50vh;
                height: 10%;
                font-size: 300%;
                border: 2px solid #00ff00;
                text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00, 0 0 15px #00ff00;

                display: flex;
                justify-content: center;
                align-items: center;
            }

            h1 {
                font-family: 'Chiller', cursive;
                z-index: 3;
                position: relative;
                color: #323131;
                text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00, 0 0 15px #00ff00;
            }

            .center {
                display: flex;
                align-items: center;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 2;
                flex-direction: column;
                gap: 20px;
            }

            button:hover {
                background-color: black;
                box-shadow: 0 10px 20px #000000, 0 0 5px #00ff00, 0 0 10px #00ff00, 0 0 15px #00ff00;
                color: #000000;
            }

            .background {
                width: 100%;
                height: 100vh;
                object-fit: cover;
                z-index: -5;
            }

            #notePaper {
                display: none;
                position: absolute;
                width: 50%;
                height: auto;
            }

            .noteText {
                max-width: 50vh;
                top: 10%;
                text-align: center;
            }

            .fade-out {
                animation: fadeOut 1s forwards;
            }

            .fade-in {
                animation: fadeIn 1s forwards;
            }

            @keyframes fadeOut {
                from {
                    opacity: 1;
                    visibility: visible;
                }
                to {
                    opacity: 0;
                    visibility: hidden;
                }
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    visibility: hidden;
                }
                to {
                    opacity: 1;
                    visibility: visible;
                }
            }

            .hidden {
                display: none;
            }

            .arrow {
                position: absolute;
                height: auto;
                width: 10%;
            }

            /* .arrow:hover {
                
            } */

            #arrows {
                position: absolute;
                display: flex;
                align-items: center;
                visibility: hidden;
                bottom: 0%;
                left: 0%;
                right: 0%;
                top: 0%;
            }

            #hitbox {
                display: none;
                position: absolute;
                width: 15%;
                height: 15%;
                top: 45%;
                left: 52%;
                transform: translate(-50%, -50%);
                z-index: 15;
            }

            #key {
                position: absolute;
                top: 50%;
                left: 90%;
                width: 10%;
                height: auto;
                display: none;
                z-index: 10;
            }

            img {
                -webkit-user-drag: none;
                user-select: none;
            }

            #keypad {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                grid-gap: 10px;
                padding: 10px;
            }

            #keypadContainer {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background-color: rgb(38, 38, 38);
                border: black 2px solid;
                display: none;
                padding-bottom: 10px;
            }

            #keypad button {
                height: 100px;
                width: 100px;
            }

            #exitButton {
                margin-left: 10px;
                width: 320px;
                height: 100px;
            }

            #cardsOverallContainer {
                position: absolute;
                z-index: 100;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                display: none;
                grid-template-columns: repeat(4, 1fr);
            }

            .cards {
                width: auto;
                height: 380px;
                width: 380px;
                transform-style: preserve-3d;
                transition: all 1.5s ease;
                margin-right: -100px;
            }

            .front {
                position: absolute;
                width: 100%;
                height: 100%;
                backface-visibility: hidden;
            }

            .back {
                position: absolute;
                width: 100%;
                height: 100%;
                backface-visibility: hidden;
                transform: rotateY(180deg);
            }

            .flipped {
                transform: rotateY(180deg);
            }

            .exitButton {
                transform: translate(0%, -50%);
                position: absolute;
                top: 50%;
                width: 10%;
                margin-left: 5%;
                display: block;
                z-index: 100;
                visibility: hidden;
            }

            #hitboxPower {
                display: none;
                position: absolute;
                left: 44.5%;
                top: 32.25%;
                width: 8%;
                height: 33.5%;
                background-color: lightblue;
                opacity: 50%;
                z-index: 100;
            }

            #hitboxPaper {
                display: none;
                position: absolute;
                left: 46%;
                top: 83%;
                width: 10%;
                height: 10%;
                background-color: lightblue;
                opacity: 50%;
                z-index: 100;
            }

            #hitboxMessageDoor {
                display: none;
                position: absolute;
                left: 46%;
                top: 38%;
                width: 8%;
                height: 20%;
                background-color: lightblue;
                opacity: 50%;
                z-index: 100;
            }

            #hitboxFinalDoor {
                display: none;
                position: absolute;
                left: 46.5%;
                top: 40%;
                width: 10.5%;
                height: 30%;
                background-color: lightblue;
                opacity: 50%;
                z-index: 100;
            }

            #powerBox {
                width: 70%;
                height: 70%;
                margin-top: 5%;
                border: 3px solid #00ff00;
                top: 10%;
                left: 22%;
                position: absolute;
                visibility: hidden;
                background-color: #1d1d1d;
                margin: 0 auto;
                z-index: 900;
            }

            .mole {
                position: absolute;
                width: 110px;
                height: 110px;
            }

            #powerBox p {
                position: absolute;
                font-family: 'Chiller', cursive;
                left: 15px;
                z-index: 999;
                font-size: 50px;
                pointer-events: none;
                text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00, 0 0 15px #00ff00;
                color: white;
                margin: 0;
                margin-top: 5px;
            }
        </style>
    </head>
    <body>
        <img id="splashScreen" class="background" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/gptPrison.png?raw=true">
        <div class="center">
            <img id="notePaper" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/notePaper.png?raw=true">
            <h1 style="font-size: 600%;">IMPOSSIBLE ESCAPE</h1>
            <h1 style="position: absolute;">An Escape Room game made by Anthony Skyba</h1>
            <button onclick="activateButton('play')">Play</button>
            <button onclick="activateButton('story')">Story</button>
            <button onclick="activateButton('instructions')">Instructions</button>
            <h1 class="noteText hidden"></h1>
            <h1 class="noteText hidden"></h1>
            <button onclick="activateButton('back')" style="display: none;">Back</button>
            <img id="lockedDoor" class="hidden" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/lockedDoor.png?raw=true">
            <img id="brickWall" class="hidden" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/brickWall.png?raw=true">
            <img id="keyWall" class="hidden" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/keyWall.png?raw=true">
            <div id="arrows">
                <img class="arrow" style="left: 100%;" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/arrow.png?raw=true">
                <img class="arrow" style="left: 100%;" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/arrow.png?raw=true">
                <div id="keypadContainer">
                    <div id="keypad">
                        <button onclick="keypadCode(1)">1</button>
                        <button onclick="keypadCode(2)">2</button>
                        <button onclick="keypadCode(3)">3</button>
                        <button onclick="keypadCode(4)">4</button>
                        <button onclick="keypadCode(5)">5</button>
                        <button onclick="keypadCode(6)">6</button>
                        <button onclick="keypadCode(7)">7</button>
                        <button onclick="keypadCode(8)">8</button>
                        <button onclick="keypadCode(9)">9</button>
                    </div>
                    <button id="exitButton">Exit</button>
                </div>
            </div>
        </div>
        <div id="hitboxPower">power</div>
        <div id="hitboxPaper">paper</div>
        <div id="hitboxMessageDoor">message</div>
        <div id="hitboxFinalDoor">final</div>
        <div id="hitbox"></div>
        <img id="key" class="hidden" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/coolKey.png?raw=true">
        <img id="tilesRoom" class="hidden" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/tilesRoom.png?raw=true">
        <img id="cardsRoom" class="hidden" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/cardsRoom.png?raw=true">
        <img id="lockedKeypad" class="hidden" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/keypadLocked1.png?raw=true">
        <button id="exitButton2" class="exitButton">Exit</button>
        <button id="exitButton3" class="exitButton">Exit</button>
        <div id="cardsOverallContainer"></div>
        <img id="generatorRoom" class="background hidden" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/generatorRoom.png?raw=true">
        <img id="generatorRoomExploded" class="background hidden" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/generatorRoomExploded.png?raw=true">
        <img id="finalDoorLocked" class="background hidden" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/finalDoorLocked.png?raw=true">
        <img id="finalDoorUnlocked" class="background hidden" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/finalDoorUnlocked.png?raw=true">
        <img id="messageDoorClosed" class="background hidden" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/messageDoorClosedReplacement.png?raw=true">
        <img id="messageDoorOpen" class="background hidden" src="https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/messageDoorOpen.png?raw=true">
        <div id="powerBox">
            <p id="time"></p>
            <p id="score" style="top: 50px"></p>
        </div>

        <script>
            let memoryCompleted = false
            let hitbox = document.getElementById("hitbox")
            let stopSpawning
            let roomExploded = false
            
            let arrowRight = Array.from(document.getElementsByClassName("arrow"))[0]
            let arrowLeft = Array.from(document.getElementsByClassName("arrow"))[1]
            arrowLeft.style.transform = "scaleX(-1)"
            let arrowContainer = document.getElementById("arrows")
            arrowRight.style.left = "90%"
            arrowLeft.style.left = "0%"
            
            let hideSplash = true
            let notePaper = document.getElementById("notePaper")
            
            let buttons = Array.from(document.querySelectorAll("button"))
            let playButton = buttons[0]
            let storyButton = buttons[1]
            let instructionsButton = buttons[2]
            let backButton = buttons[3]

            let headings = Array.from(document.querySelectorAll("h1"))
            let heading1 = headings[0]
            let heading2 = headings[1]
            let storyHeading = headings[2]
            let instructionsHeading = headings[3]
            
            storyHeading.innerText = ""
            instructionsHeading.innerText = "Click around on the screen to find clues and solve puzzles.\n- Press \"x\" to get a hint\n - Refresh the page (ctrl+r) to return to the title screen\n - Play with audio for full experience"

            document.body.addEventListener("dragstart", function(event) {
                event.preventDefault()
            })

            function activateButton(button) {
                let x
                let y

                if (hideSplash) {
                    x = "none"
                    y = "flex"
                    hideSplash = false
                } else {
                    x = "flex"
                    y = "none"
                    hideSplash = true
                }
                playButton.style.display = x
                storyButton.style.display = x
                instructionsButton.style.display = x
                heading1.style.display = x
                heading2.style.display = x

                if (button == "play") {
                    let splashScreen = document.getElementById("splashScreen") 
                    splashScreen.className = "fade-out background"
                    splashScreen.addEventListener("animationend", function() {
                        splashScreen.style.display = "none"
                        area3()
                    }, {once: true})
                    return
                }

                backButton.style.display = y
                backButton.style.top = "10%"
                notePaper.style.display = y

                if (button == "back") {
                    storyHeading.style.display = "none"
                    instructionsHeading.style.display = "none"
                    return
                }
                if (button == "story") storyHeading.style.display = "flex"
                else instructionsHeading.style.display = "flex"
            }

            let timesRun = 0
            function arrowEvent(room1, room2, room3, area) {
                timesRun++
                if (timesRun > 1) {
                    arrowLeft.removeEventListener("click", arrowL)
                    arrowRight.removeEventListener("click", arrowR)
                }

                function arrowL() {
                    arrowLeft.className = "arrow fade-out"
                    arrowRight.className = "arrow fade-out"
                    if (room2.style.display != "none") {
                        room2.className = "fade-out background"
                        room2.addEventListener("animationend", function() {
                            room2.style.display = "none"
                            room1.style.display = "block"
                            room1.className = "fade-in background"
                            arrowRight.className = "arrow fade-in"
                            hitbox2.style.left = "68%"
                            hitbox2.style.top = "91%"
                            if (area == 3) {
                                hitboxPaper.style.display = "none"
                                hitboxPower.style.display = "none"
                                hitboxFinalDoor.style.display = "block"
                                arrowRight.style.transform = "rotate(90deg)"
                                arrowRight.style.top = "80%"
                                arrowRight.style.left = "46.75%"
                            }
                        }, {once: true})
                    } else {
                        room3.className = "fade-out background"
                        room3.addEventListener("animationend", function() {
                            room3.style.display = "none"
                            room2.style.display = "block"
                            room2.className = "fade-in background"
                            arrowLeft.className = "arrow fade-in"
                            arrowRight.className = "arrow fade-in"
                            hitbox.style.display = "none"
                            if (area == 3) {
                                hitboxPaper.style.display = "block"
                                hitboxPower.style.display = "block"
                                hitboxMessageDoor.style.display = "none"
                                arrowLeft.style.transform = "rotate(-90deg) translate(0%, -50%)"
                                arrowLeft.style.top = "1%"
                                arrowLeft.style.left = "50%"
                            }
                        }, {once: true})
                    }
                }
                arrowLeft.addEventListener("click", arrowL)

                function arrowR() {
                    arrowLeft.className = "arrow fade-out"
                    arrowRight.className = "arrow fade-out"
                    if (room2.style.display != "none") {
                        if (area == 2 && !memoryCompleted) return
                        room2.className = "fade-out background"
                        room2.addEventListener("animationend", function() {
                            room2.style.display = "none"
                            room3.style.display = "block"
                            room3.className = "fade-in background"
                            arrowLeft.className = "arrow fade-in"
                            hitbox.style.display = "block"
                            if (area == 3) {
                                hitboxPaper.style.display = "none"
                                hitboxPower.style.display = "none"
                                hitboxMessageDoor.style.display = "block"
                                arrowLeft.style.top = ""
                                arrowLeft.style.left = ""
                                arrowLeft.style.transform = "scaleX(-1)"
                            }
                        }, {once: true})
                    } else {
                        room1.className = "fade-out background"
                        room1.addEventListener("animationend", function() {
                            room1.style.display = "none"
                            room2.style.display = "block"
                            room2.className = "fade-in background"
                            arrowLeft.className = "arrow fade-in"
                            if (memoryCompleted || area != 2)
                                arrowRight.className = "arrow fade-in"
                            hitbox2.style.left = "49.5%"
                            hitbox2.style.top = "45%"
                            if (area == 3) {
                                hitboxPaper.style.display = "block"
                                hitboxPower.style.display = "block"
                                hitboxFinalDoor.style.display = "none"
                                arrowRight.style.transform = ""
                                arrowRight.style.top = ""
                                arrowRight.style.left = "90%"
                            }
                        }, {once: true})
                    }
                }
                arrowRight.addEventListener("click", arrowR)
            }

            function area1() {
                let lockedDoor = document.getElementById("lockedDoor")
                let keyWall = document.getElementById("keyWall")
                let brickWall = document.getElementById("brickWall")
                let removeEvent = false
                let key1 = document.getElementById("key")
                
                splashScreen.style.display = "none"
                lockedDoor.className = "fade-in background"

                arrowContainer.className = "fade-in"
                arrowEvent(brickWall, lockedDoor, keyWall)

                hitbox.addEventListener("mousedown", function key(event) {
                    if (lockedDoor.style.display == "block" || event.buttons != 1) return
                    document.body.addEventListener("mouseup", function(mouseEvent) {
                        let XPos1 = mouseEvent.clientX
                        let YPos1 = mouseEvent.clientY
                        removeEvent = true
                        key1.style.display = "none"
                        if (lockedDoor.style.display == "block" && XPos1 > (screen.width / 5) * 2 && XPos1 < (screen.width / 5) * 3 && YPos1 > screen.height / 3 && YPos1 < (screen.height / 5) * 4) {
                            area1to2()
                        }
                    }, {once: true})

                    let room2 = false
                    document.body.addEventListener("mousemove", function followMouse(mouseEvent2) {
                        if (mouseEvent2.buttons != 1) {
                            let XPos1 = mouseEvent2.clientX
                            let YPos1 = mouseEvent2.clientY
                            removeEvent = true
                            key1.style.display = "none"
                            if (lockedDoor.style.display == "block" && XPos1 > (screen.width / 5) * 2 && XPos1 < (screen.width / 5) * 3 && YPos1 > screen.height / 3 && YPos1 < (screen.height / 5) * 4) {
                                area1to2()
                            }
                        }
                        let XPos2 = mouseEvent2.clientX
                        let YPos2 = mouseEvent2.clientY

                        key1.style.display = "block"
                        key1.style.left = XPos2 - 40 + "px"
                        key1.style.top = YPos2 - 80 + "px"

                        if (YPos2 > screen.height / 3 && YPos2 < (screen.height / 3) * 2 && XPos2 < screen.width / 8 && !room2) {
                            room2 = true
                            arrowContainer.className = "fade-out"
                            keyWall.className = "background fade-out"
                            keyWall.addEventListener("animationend", function() {
                                lockedDoor.style.display = "block";
                                lockedDoor.className = "background fade-in"
                                arrowContainer.style.display = "flex";
                                arrowContainer.className = "fade-in"
                                arrowRight.className = "arrow fade-in"
                            }, {once: true})

                        }

                        if (removeEvent) {
                            document.body.removeEventListener("mousemove", followMouse)
                            key1.style.display = "none"
                            removeEvent = false
                        }
                    })
                })
            }

            function area1to2() {
                lockedDoor.className = "background fade-out"
                arrowRight.className = "arrow fade-out"
                arrowContainer.className = "fade-out"
                hitbox.style.display = "none"
                lockedDoor.addEventListener("animationend", area2)
            }

            let hitbox2 = document.getElementById("hitbox").cloneNode(true)
            let userInput = []
            let lockedKeypad = document.getElementById("lockedKeypad")
            
            function keypadCode(num) {
                userInput.push(num)
            }

            function area2() {
                let cardsRoom = document.getElementById("cardsRoom")
                let tilesRoom = document.getElementById("tilesRoom")
                let keypadContainer = document.getElementById("keypadContainer")
                
                document.body.appendChild(hitbox2)
                hitbox2.style.width = "10%"
                hitbox2.style.display = "block"
                hitbox2.style.left = "49.5%"
                hitbox2.style.top = "45%"

                hitbox2.addEventListener("click", function() {
                    if (lockedKeypad.style.display != "none") {
                        keypadContainer.style.display = "block"
                        hitbox2.style.zIndex = 0
                        let exitButton = document.getElementById("exitButton")
                        exitButton.addEventListener("click", function() {
                            keypadContainer.style.display = "none"
                            hitbox2.style.zIndex = 50
                            if (Number(userInput.join("")) == 9 && memoryCompleted)
                                area2to3()
                            else
                                userInput = []
                        }, {once: true})
                    } else if (cardsRoom.style.display != "none" && !memoryCompleted) {
                        memoryGame()
                    }
                })

                arrowContainer.className = "fade-in"

                lockedKeypad.className = "background fade-in"
                lockedKeypad.style.display = "block"

                arrowEvent(cardsRoom, lockedKeypad, tilesRoom, 2)

                function memoryGame() {
                    let exitButton2 = document.getElementById("exitButton2")
                    let cardsFlipped = 0
                    let currentCardsFlipped = 0
                    let cardsMatched = 0
                    let firstCardFlipped
                    let cardsContainer = document.getElementById("cardsOverallContainer")
                    let cards = [
                        "https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/card1.png?raw=true",
                        "https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/card2Replacement.png?raw=true",
                        "https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/card3.png?raw=true",
                        "https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/card4.png?raw=true"
                    ]
                    
                    arrowContainer.className = "fade-out"
                    cards = cards.concat(cards)
                    cardsContainer.style.display = "grid"
                    hitbox2.style.display = "none"
                    exitButton2.classList.add("fade-in")

                    exitButton2.addEventListener("click", function() {
                        cardsMatched = 0
                        currentCardsFlipped = 0
                        cardsFlipped = 0
                        cardsContainer.className = "fade-out"
                        exitButton2.className = "fade-out"
                        arrowContainer.className = "fade-in"
                        
                        let cardsDivs = Array.from(document.getElementsByClassName("cards"))
                        cardsDivs.forEach(cardDiv1 => {
                            cardDiv1.removeEventListener("click", cardFlipper)
                        })
                        exitButton2.addEventListener("animationend", function() {
                            Array.from(cardsContainer.children).forEach(child => child.remove())
                            hitbox2.style.display = "block"
                        }, {once: true})
                    })

                    for (let i = 0; i < 8; i++) {
                        let randomElement = Math.floor(Math.random() * cards.length)
                        let randomImg = document.createElement("img")
                        let cardDiv = document.createElement("div")
                        let back = document.createElement("img")

                        randomImg.src = cards[randomElement]
                        randomImg.className = "back"
                        cards.splice(randomElement, 1)

                        back.src = "https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/cardBack.png?raw=true"
                        back.className = "front"

                        cardDiv.className = "cards"
                        cardsContainer.appendChild(cardDiv)
                        cardDiv.appendChild(back)
                        cardDiv.appendChild(randomImg)
                        cardDiv.addEventListener("click", cardFlipper)
                    }

                    function cardFlipper() {
                        let currentCard = this
                        let card = Array.from(this.children)[1]
                        if (this.classList.contains("flipped") || currentCardsFlipped >= 2) return
                        currentCardsFlipped++
                        this.classList.add("flipped")
                        if (cardsFlipped == 1) {
                            cardsFlipped = 0
                            if (card.src == firstCardFlipped.children[1].src) {
                                cardsMatched++
                                currentCardsFlipped -= 2
                                if (cardsMatched == 4) {
                                    setTimeout(function() {
                                        memoryCompleted = true
                                        cardsContainer.classList.remove("fade-in")
                                        exitButton2.classList.remove("fade-in")
                                        cardsContainer.classList.add("fade-out")
                                        arrowContainer.classList.add("fade-in")
                                        exitButton2.classList.add("fade-out")
                                        hitbox2.style.display = "block"
                                    }, 1500)
                                }
                            } else {
                                setTimeout(function() {
                                    currentCard.classList.remove("flipped")
                                    firstCardFlipped.classList.remove("flipped")
                                        currentCardsFlipped -= 2
                                }, 1500)
                            }
                        } else {
                            firstCardFlipped = this
                            cardsFlipped++
                        }
                    }
                    cardsContainer.classList.add("fade-in")
                }
            }
            
            function area2to3() {
                lockedKeypad.className = "background fade-out"
                arrowContainer.className = "fade-out"
                arrowContainer.addEventListener("animationend", function() {
                    area3()
                })
            }

            let hitboxPower = document.getElementById("hitboxPower")
            let hitboxPaper = document.getElementById("hitboxPaper")
            let hitboxMessageDoor = document.getElementById("hitboxMessageDoor")
            let hitboxFinalDoor = document.getElementById("hitboxFinalDoor")
            let generatorRoomExploded = document.getElementById("generatorRoomExploded")
            let messageDoorOpen = document.getElementById("messageDoorOpen")
            function area3() {
                let finalDoorUnlocked = document.getElementById("finalDoorUnlocked")
                let finalDoorLocked = document.getElementById("finalDoorLocked")
                let messageDoorClosed = document.getElementById("messageDoorClosed")
                let generatorRoom = document.getElementById("generatorRoom")
                let exitButton3 = document.getElementById("exitButton3")
                exitButton3.addEventListener("click", function() {
                    if (generatorRoom.style.display != "none" && hitboxPaper.style.display == "none") {
                        stopSpawning = true
                        exitButton3.className = "exitButton fade-out"
                        document.getElementById("powerBox").className = "fade-out"
                        arrowContainer.className = "fade-in"
                        hitboxPaper.style.display = "block"

                        for (let image of Array.from(document.getElementsByClassName("mole")))
                            image.remove()
                    }
                })
                
                hitboxPower.addEventListener("click", function() {
                    exitButton3.className = "exitButton fade-in"
                    arrowContainer.className = "fade-out"
                    hitboxPaper.style.display = "none"
                    whackAMole()
                })

                generatorRoom.className = "background fade-in"
                arrowContainer.className = "fade-in"
                arrowLeft.style.transform = "rotate(-90deg) translate(0%, -50%)"
                arrowLeft.style.top = "1%"
                arrowLeft.style.left = "50%"

                hitboxPower.style.display = "block"
                hitboxPaper.style.display = "block"

                arrowEvent(finalDoorLocked, generatorRoom, messageDoorClosed, 3)

                
            }

            function whackAMole() {
                setTimeout(deleteImage, 2500)
                let box = document.getElementById("powerBox")
                let counter = 0
                stopSpawning = false

                document.getElementById("time").innerText = "Time: 20"
                document.getElementById("score").innerText = "Batteries: 0"

                box.className = "fade-in"
                box.addEventListener("animationend", function() {
                    startGame()
                }, {once: true})
                
                function startGame() {
                    box.style.display = "block"
                    if (stopSpawning) {
                        endGame()
                        return
                    }

                    let timeArray = document.getElementById("time").innerText.split(" ")
                    let image = document.createElement("img")
                    image.className = "mole"
                    let bomb = false

                    if (counter % 3 == 0)
                        document.getElementById("time").innerText = timeArray[0] + " " + (Number(timeArray[1]) - 1)
                    
                    if (Number(timeArray[1]) <= 0) {
                        endGame()
                        return
                    }

                    if (Math.floor((Math.random() * 4)) == 0) {
                        image.src = "https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/dynamite.png?raw=true"
                        bomb = true
                    } else
                        image.src = "https://github.com/anthonyskyba/anthonyskyba.github.io/blob/main/Projects/SkybaAEscapeRoom/battery.png?raw=true"

                    image.alt = "image not loaded"
                    image.style.left = Math.floor(Math.random() * (box.clientWidth - 110)) + "px"
                    image.style.top = Math.floor(Math.random() * (box.clientHeight - 110)) + "px" 

                    box.appendChild(image)

                    let moles = Array.from(document.getElementsByClassName("mole"))
                    let createdImage = moles[moles.length - 1]
                    createdImage.addEventListener("click", function() {
                        if (bomb) {
                            endGame(true)
                            return
                        }
                        
                        let scoreArray = document.getElementById("score").innerText.split(" ")
                        createdImage.remove()
                        document.getElementById("score").innerText = scoreArray[0] + " " + (Number(scoreArray[1]) + 1)
                    })

                    counter++   
                    setTimeout(startGame, 333.333)
                }

                function endGame(bomb) {
                    for (let image of Array.from(document.getElementsByClassName("mole")))
                        image.remove()

                    stopSpawning = true
                    if (bomb) {
                        roomExploded = true
                        hitboxPower.style.visibility = "hidden"
                        exitButton3.className = "exitButton fade-out"
                        box.className = "fade-out"
                        generatorRoom.className = "background fade-out"
                        exitButton3.addEventListener("animationend", function() {
                            generatorRoomExploded.style.top = "0px";
                            generatorRoomExploded.style.left = "0px";
                            generatorRoomExploded.className = "background fade-in"
                            generatorRoomExploded.style.zIndex = 1
                            arrowContainer.className = "fade-in"
                        }, {once: true})
                    } else {
                        exitButton3.className = "exitButton fade-out"
                        box.className = "fade-out"
                        arrowContainer.className = "fade-in"
                        hitboxPaper.style.display = "block"
                    }
                }

                function deleteImage() {
                    if (Array.from(document.getElementsByClassName("mole")).length <= 0) return
                    Array.from(document.getElementsByClassName("mole"))[0].remove()
                    setTimeout(deleteImage, 450)
                }
            }
            
        </script>
    </body>
</html>
