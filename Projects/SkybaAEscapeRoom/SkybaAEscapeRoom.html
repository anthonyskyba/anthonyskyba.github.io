<!DOCTYPE html>
<html>
    <head>
        <title>Escape Room</title>
        <style>
            body, html {
                margin: 0;
                padding: 0;
                overflow-y: hidden;
                height: 100%;
            }

            button {
                font-family: 'Chiller', cursive;
                background-color: #222;
                transition: 0.4s ease;
                position: relative;
                z-index: 1;
                color: #8B0000;
                width: 10%;
                height: 10%;
                font-size: 300%;
                border: 2px solid #00ff00;
                text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00, 0 0 15px #00ff00;
            }

            h1 {
                font-family: 'Chiller', cursive;
                z-index: 3;
                position: relative;
                color: #8B0000;
                text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00, 0 0 15px #00ff00;
            }

            .center {
                display: flex;
                align-items: center;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 2;
                flex-direction: column;
                gap: 20px;
            }

            button:hover {
                background-color: black;
                box-shadow: 0 10px 20px #000000, 0 0 5px #00ff00, 0 0 10px #00ff00, 0 0 15px #00ff00;
                color: #6b0000;
            }

            .background {
                width: 100%;
                height: 100vh;
                object-fit: cover;
            }

            #notePaper {
                display: none;
                position: absolute;
                width: 50%;
                height: auto;
            }

        </style>
    </head>
    <body>
        <img class="background" src="https://files.oaiusercontent.com/file-zxJuYt8yksCBwIhXa3Lcm88r?se=2023-10-25T21%3A57%3A15Z&sp=r&sv=2021-08-06&sr=b&rscc=max-age%3D31536000%2C%20immutable&rscd=attachment%3B%20filename%3D0590f846-505a-4551-9d59-dbbb590c503c.webp&sig=Vybxb1VJILv%2Bz6Me7tpHf6H3qnumyY43k/69ygWpyqQ%3D">
        <div class="center">
            <img id="notePaper" src="C:\Users\antho\Downloads\notePaper.png">
            <h1 style="font-size: 600%;">idk a title yet</h1>
            <h1 style="position: absolute; top: 15%;">An Escape Room game made by Anthony Skyba</h1>
            <button onclick="activateButton('play')">Play</button>
            <button onclick="activateButton('story')">Story</button>
            <button onclick="activateButton('instructions')">Instructions</button>
            <h1 style="display: none;">story goes here yeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeehawwwwww</h1>
            <h1 style="display: none;">instructions go here agagagagagagagagagagagag</h1>
            <button onclick="activateButton('back')" style="display: none;">Back</button>
        </div>

        <script>
            let hideSplash = true
            let notePaper = document.getElementById("notePaper")

            let buttons = Array.from(document.querySelectorAll("button"))
            let playButton = buttons[0]
            let storyButton = buttons[1]
            let instructionsButton = buttons[2]
            let backButton = buttons[3]
            
            let headings = Array.from(document.querySelectorAll("h1"))
            let heading1 = headings[0]
            let heading2 = headings[1]
            let storyHeading = document.getElementById("story")
            let instructionsHeading = document.getElementById("instructions")
            
            function activateButton(button) {
                let x
                let y

                if (hideSplash) {
                    x = "none"
                    y = "flex"
                    hideSplash = false
                } else {
                    x = "flex"
                    y = "none"
                    hideSplash = true
                }
                playButton.style.display = x
                storyButton.style.display = x
                instructionsButton.style.display = x
                heading1.style.display = x
                heading2.style.display = x

                if (button == "play") {
                    play()
                    return
                }

                backButton.style.display = y
                notePaper.style.display = y

                if (button == "back") {
                    storyDiv.style.display = "none"
                    instructionsDiv.style.display = "none"
                    return
                }
                if (button == "story") storyDiv.style.display = "flex"
                if (button == "instructions") instructionsDiv.style.display = "flex"
            }
        </script>
    </body>
</html>
